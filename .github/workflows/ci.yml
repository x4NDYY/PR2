name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build project
        run: |
          cd src
          make publish

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build project
        run: |
          cd src
          make publish

      - name: Run test
        run: |
          cd ./tests
          dotnet test

  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
    
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build project
        run: |
          cd src
          make publish

      - name: Install dpkg
        run: sudo apt update && sudo apt install -y dpkg

      - name: Build deb package
        run: |
          mkdir -p build/usr/local/bin
          mkdir -p build/DEBIAN
          cp src/bin/Release/net8.0/linux-x64/publish/PR1 build/usr/local/bin/
          chmod 755 build/usr/local/bin/PR1
          cp DEBIAN/control build/DEBIAN/
          dpkg-deb --build build pr1_1.0.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: pr1_1.0.deb

  deploy:
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download deb package
        uses: actions/download-artifact@v4
        with:
          name: deb-package

      - name: Build Docker image
        run: docker build -t pr1-app .

      - name: Run container
        run: docker run pr1-app

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag image
        run: docker tag pr1-app ${{ secrets.DOCKER_USERNAME }}/pr1-app:latest

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/pr1-app:latest
